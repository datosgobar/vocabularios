id: dataset-spatial-uri
name:
  es: Cobertura geográfica del dataset (URI territorial)
  en: Dataset Spatial URI
description:
  es: >
    URIs de referencia geográfica para indicar la cobertura territorial de un dataset.
    Las URIs apuntan al vocabulario de territorio de datos.gob.ar
    (https://infra.datos.gob.ar/vocabulario/territorio-argentina/).
    Cubre el país, las regiones estadísticas y las 24 jurisdicciones (23 provincias + CABA).
  en: >
    Geographic reference URIs to indicate the territorial coverage of a dataset.
    URIs point to the datos.gob.ar territory vocabulary
    (https://infra.datos.gob.ar/vocabulario/territorio-argentina/).
    Covers the country, statistical regions and 24 jurisdictions (23 provinces + CABA).
source: https://infra.datos.gob.ar/vocabulario/territorio-argentina/
display_property: dct:spatial

