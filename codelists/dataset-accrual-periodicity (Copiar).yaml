id: dataset-accrual-periodicity
name:
  es: Frecuencia de actualización
  en: Accrual Periodicity
description:
  es: >
    Frecuencia con la que se actualiza el dataset.
    Usa el vocabulario EU Publications Office Frequency
    (http://publications.europa.eu/resource/authority/frequency/).
    Los valores de intervalo siguen la notación ISO 8601 de duración recurrente (R/P…).
  en: >
    Frequency at which the dataset is updated.
    Uses the EU Publications Office Frequency vocabulary
    (http://publications.europa.eu/resource/authority/frequency/).
    Interval values follow ISO 8601 recurring duration notation (R/P…).
source: http://publications.europa.eu/resource/authority/frequency/
display_property: dct:accrualPeriodicity

values:
  - id: CONT
    uri: http://publications.europa.eu/resource/authority/frequency/CONT
    iso8601: R/PT1S
    label:
      es: Continuo (cada segundo)
      en: Continuous (every second)
    description:
      es: El dataset se actualiza de forma continua, prácticamente en tiempo real.
      en: The dataset is updated continuously, practically in real time.

  - id: HOURLY
    uri: http://publications.europa.eu/resource/authority/frequency/HOURLY
    iso8601: R/PT1H
    label:
      es: Cada hora
      en: Hourly
    description:
      es: El dataset se actualiza una vez por hora.
      en: The dataset is updated once per hour.

  - id: DAILY
    uri: http://publications.europa.eu/resource/authority/frequency/DAILY
    iso8601: R/P1D
    label:
      es: Diariamente
      en: Daily
    description:
      es: El dataset se actualiza una vez por día.
      en: The dataset is updated once per day.

  - id: WEEKLY
    uri: http://publications.europa.eu/resource/authority/frequency/WEEKLY
    iso8601: R/P1W
    label:
      es: Semanalmente
      en: Weekly
    description:
      es: El dataset se actualiza una vez por semana.
      en: The dataset is updated once per week.

  - id: BIWEEKLY
    uri: http://publications.europa.eu/resource/authority/frequency/BIWEEKLY
    iso8601: R/P0.5M
    label:
      es: Quincenalmente
      en: Biweekly
    description:
      es: El dataset se actualiza dos veces por mes (cada 15 días aproximadamente).
      en: The dataset is updated twice per month (every ~15 days).

  - id: MONTHLY
    uri: http://publications.europa.eu/resource/authority/frequency/MONTHLY
    iso8601: R/P1M
    label:
      es: Mensualmente
      en: Monthly
    description:
      es: El dataset se actualiza una vez por mes.
      en: The dataset is updated once per month.

  - id: BIMONTHLY
    uri: http://publications.europa.eu/resource/authority/frequency/BIMONTHLY
    iso8601: R/P2M
    label:
      es: Bimestralmente
      en: Bimonthly
    description:
      es: El dataset se actualiza una vez cada dos meses.
      en: The dataset is updated once every two months.

  - id: QUARTERLY
    uri: http://publications.europa.eu/resource/authority/frequency/QUARTERLY
    iso8601: R/P3M
    label:
      es: Trimestralmente
      en: Quarterly
    description:
      es: El dataset se actualiza una vez por trimestre (cada 3 meses).
      en: The dataset is updated once per quarter (every 3 months).

  - id: ANNUAL_3
    uri: http://publications.europa.eu/resource/authority/frequency/ANNUAL_3
    iso8601: R/P4M
    label:
      es: Cuatrimestralmente
      en: Three times a year
    description:
      es: El dataset se actualiza tres veces por año (cada 4 meses).
      en: The dataset is updated three times per year (every 4 months).

  - id: ANNUAL_2
    uri: http://publications.europa.eu/resource/authority/frequency/ANNUAL_2
    iso8601: R/P6M
    label:
      es: Semestralmente
      en: Semiannual
    description:
      es: El dataset se actualiza dos veces por año (cada 6 meses).
      en: The dataset is updated twice per year (every 6 months).

  - id: ANNUAL
    uri: http://publications.europa.eu/resource/authority/frequency/ANNUAL
    iso8601: R/P1Y
    label:
      es: Anualmente
      en: Annual
    description:
      es: El dataset se actualiza una vez por año.
      en: The dataset is updated once per year.

  - id: BIENNIAL
    uri: http://publications.europa.eu/resource/authority/frequency/BIENNIAL
    iso8601: R/P2Y
    label:
      es: Bianualmente
      en: Biennial
    description:
      es: El dataset se actualiza una vez cada dos años.
      en: The dataset is updated once every two years.

  - id: QUADRENNIAL
    uri: http://publications.europa.eu/resource/authority/frequency/QUADRENNIAL
    iso8601: R/P4Y
    label:
      es: Cada cuatro años
      en: Quadrennial
    description:
      es: El dataset se actualiza una vez cada cuatro años.
      en: The dataset is updated once every four years.

  - id: DECENNIAL
    uri: http://publications.europa.eu/resource/authority/frequency/DECENNIAL
    iso8601: R/P10Y
    label:
      es: Decenal (cada 10 años)
      en: Decennial
    description:
      es: El dataset se actualiza una vez cada diez años (ej. censos).
      en: The dataset is updated once every ten years (e.g. censuses).

  - id: IRREG
    uri: http://publications.europa.eu/resource/authority/frequency/IRREG
    iso8601: ~
    label:
      es: Eventual / Irregular
      en: Irregular
    description:
      es: El dataset se actualiza de forma no periódica o eventual, sin intervalo fijo.
      en: The dataset is updated on an irregular or one-off basis, with no fixed interval.
