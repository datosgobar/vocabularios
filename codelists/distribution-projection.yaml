id: distribution-projection
name:
  es: Sistema de referencia de coordenadas (proyección) de la distribución
  en: Distribution Coordinate Reference System (Projection)
description:
  es: >
    Sistema de referencia de coordenadas (CRS) utilizado en el archivo geoespacial.
    Se identifican mediante códigos EPSG (https://epsg.io/).
    Solo aplicable a distribuciones con datos geográficos o cartográficos.
  en: >
    Coordinate reference system (CRS) used in the geospatial file.
    Identified by EPSG codes (https://epsg.io/).
    Only applicable to distributions with geographic or cartographic data.
source: https://epsg.io/
display_property: dct:conformsTo

values:
  # ── Globales — web mapping y datos abiertos ───────────────────────────────
  - id: EPSG-4326
    epsg_code: "EPSG:4326"
    uri: https://epsg.io/4326
    label:
      es: EPSG:4326 — WGS 84 (GPS, GeoJSON, estándar internacional)
      en: EPSG:4326 — WGS 84 (GPS, GeoJSON, international standard)
    description:
      es: Sistema geodésico mundial WGS 84. Estándar de facto para GPS, GeoJSON y la mayoría de datos abiertos geoespaciales. Coordenadas en grados decimales (latitud/longitud).
      en: WGS 84 global geodetic system. De facto standard for GPS, GeoJSON and most open geospatial data. Coordinates in decimal degrees (latitude/longitude).
    scope: global

  - id: EPSG-3857
    epsg_code: "EPSG:3857"
    uri: https://epsg.io/3857
    label:
      es: EPSG:3857 — Web Mercator (Google Maps, OpenStreetMap)
      en: EPSG:3857 — Web Mercator (Google Maps, OpenStreetMap)
    description:
      es: Proyección Mercator esférica usada por Google Maps, OpenStreetMap y servicios de mapas web. Coordenadas en metros.
      en: Spherical Mercator projection used by Google Maps, OpenStreetMap and web map services. Coordinates in meters.
    scope: global

  # ── Argentina — datum oficial actual ──────────────────────────────────────
  - id: EPSG-5340
    epsg_code: "EPSG:5340"
    uri: https://epsg.io/5340
    label:
      es: EPSG:5340 — POSGAR 2007 (datum geográfico oficial IGN)
      en: EPSG:5340 — POSGAR 2007 (official IGN geodetic datum)
    description:
      es: Sistema de Posicionamiento Geodésico Argentino 2007. Datum geográfico oficial del IGN, reemplaza a POSGAR 94. Coordenadas en grados decimales.
      en: Argentine Geodetic Positioning System 2007. Official IGN geodetic datum, replaces POSGAR 94. Coordinates in decimal degrees.
    scope: argentina

  - id: EPSG-4172
    epsg_code: "EPSG:4172"
    uri: https://epsg.io/4172
    label:
      es: EPSG:4172 — POSGAR 94 (datum anterior IGN)
      en: EPSG:4172 — POSGAR 94 (previous IGN datum)
    description:
      es: Sistema de Posicionamiento Geodésico Argentino 1994. Datum anterior al oficial actual. Aún presente en capas cartográficas legacy.
      en: Argentine Geodetic Positioning System 1994. Previous official datum. Still present in legacy cartographic layers.
